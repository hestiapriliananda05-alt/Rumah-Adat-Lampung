<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eksplorasi 3D Nuwo Sesat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 600px;
            background-color: #fdfbf7; 
            border-radius: 0.75rem;
            overflow: hidden;
            cursor: grab;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.05);
        }

        #canvas-container:active { cursor: grabbing; }

        .instruction-overlay {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            color: #78350f;
            pointer-events: none; 
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 50;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background-color: white;
            padding: 2rem;
            border-radius: 1rem;
            max-width: 500px;
            width: 90%;
            position: relative;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal.show .modal-content {
            transform: translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #9ca3af;
            line-height: 1;
        }

        .close-btn:hover { color: #111827; }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
            background: rgba(120, 53, 15, 0.8); 
            padding: 15px 30px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            z-index: 20;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 bg-gray-50">

    <header class="text-center my-6">
        <h1 class="text-3xl md:text-5xl font-extrabold text-amber-900 mb-3 tracking-tight">Virtual 3D Nuwo Sesat</h1>
        <p class="text-gray-600 text-sm md:text-base max-w-2xl mx-auto">
            Eksplorasi arsitektur Rumah Adat Lampung. Geser untuk memutar bangunan dan klik angka 1 hingga 6 untuk mempelajari makna filosofisnya.
        </p>
    </header>

    <main class="w-full max-w-5xl bg-white rounded-2xl shadow-xl p-3 md:p-6 flex flex-col items-center border border-gray-100">
        <div id="canvas-container" class="border-2 border-amber-100">
            <div id="loading">Memuat Lingkungan 3D...</div>
            <div class="instruction-overlay">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 15l7-7 7 7"/></svg>
                Geser & Putar | Klik Angka 1-6
            </div>
        </div>
    </main>

    <!-- Modal Container -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" class="text-2xl font-bold text-amber-900 mb-4 border-b-2 border-amber-100 pb-3">Judul</h2>
            
            <div class="flex items-start md:items-center mb-5 flex-col md:flex-row gap-4">
                <div id="modalIcon" class="w-16 h-16 shrink-0 rounded-2xl bg-amber-100 text-amber-600 flex items-center justify-center text-3xl shadow-inner mx-auto md:mx-0"></div>
                <p id="modalDesc" class="text-gray-600 leading-relaxed text-justify">Deskripsi filosofi akan muncul di sini.</p>
            </div>
            
            <div class="mt-6 text-center md:text-right">
                <button onclick="closeModal()" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-2.5 px-8 rounded-xl transition duration-200 shadow-lg shadow-amber-600/30 w-full md:w-auto">
                    Saya Mengerti
                </button>
            </div>
        </div>
    </div>

    <script>
        const dataFilosofi = {
            siger: { title: "1. Siger (Mekuta/Melikete)", desc: "Melambangkan kejayaan, keagungan, dan kehormatan wanita Lampung serta status sosial masyarakat.", icon: "⚜️" },
            atap: { title: "2. Atap Siger (Gajah Minung)", desc: "Melambangkan perlindungan, kekompakan, dan kearifan lokal. (Istilah \"Gajah Minung\" biasanya merujuk pada hiasan ukiran berbentuk belalai gajah yang melambangkan kekuatan dan perlindungan).", icon: "🛡️" },
            panggung: { title: "3. Rumah Panggung (Sesat)", desc: "Melambangkan keamanan, keramahtamahan, dan pusat musyawarah masyarakat adat.", icon: "👥" },
            lantai: { title: "4. Lantai (Lantai Geladak)", desc: "Mencerminkan keterbukaan, kebersamaan, dan keadilan dalam bermasyarakat.", icon: "⚖️" },
            tangga: { title: "5. Anjung / Ijan (Tangga)", desc: "Melambangkan tata krama, sopan santun, dan proses pencapaian jenjang sosial secara bertahap.", icon: "👣" },
            ukiran: { title: "6. Ukiran Tradisional", desc: "Melambangkan kekayaan seni, keindahan budaya, dan jati diri Lampung.", icon: "📜" }
        };

        let scene, camera, renderer, controls;
        let raycaster, mouse;
        let hotspots = [];
        const container = document.getElementById('canvas-container');

        window.onload = function() {
            init3D();
            animate();
            setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 1500); 
        };

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xfdfbf7); 

            camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 150);
            camera.position.set(0, 20, 75); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.01; 
            controls.minDistance = 15;
            controls.maxDistance = 100;
            controls.minAzimuthAngle = -Math.PI / 2.2; 
            controls.maxAzimuthAngle = Math.PI / 2.2;
            
            controls.target.set(0, 12, 0);
            controls.update();

            const ambientLight = new THREE.AmbientLight(0xfff0dd, 0.7); 
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffeedd, 1.3); 
            mainLight.position.set(20, 35, 25);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            mainLight.shadow.bias = -0.0005;
            scene.add(mainLight);

            const fillLight = new THREE.DirectionalLight(0xbbeeff, 0.6); 
            fillLight.position.set(-25, 15, 15);
            scene.add(fillLight);

            buildEnvironment();
            buildUltraDetailedHouse(); 
            createHotspots();

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            renderer.domElement.addEventListener('pointerdown', onPointerDown, false);
            window.addEventListener('resize', onWindowResize, false);
        }

        function buildEnvironment() {
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0xdddddd, roughness: 0.9, metalness: 0.0
            }); 
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            const platformGeo = new THREE.CylinderGeometry(18, 18, 0.2, 32);
            const platformMat = new THREE.MeshStandardMaterial({ color: 0xcfcfcf, roughness: 1 });
            const platform = new THREE.Mesh(platformGeo, platformMat);
            platform.position.y = 0.1;
            platform.receiveShadow = true;
            scene.add(platform);
        }

        function buildUltraDetailedHouse() {
            const houseGroup = new THREE.Group();
            const textureLoader = new THREE.TextureLoader();
            textureLoader.setCrossOrigin('anonymous'); 

            const matWoodBody = new THREE.MeshStandardMaterial({ color: 0x2c1608, roughness: 0.9 }); 
            const matWoodDetail = new THREE.MeshStandardMaterial({ color: 0x1a0a03, roughness: 0.95 }); 
            const matWoodFloor = new THREE.MeshStandardMaterial({ color: 0x361d0f, roughness: 0.8 }); 
            const matRoof = new THREE.MeshStandardMaterial({ color: 0x1a0a03, roughness: 0.9 }); 
            const matStone = new THREE.MeshStandardMaterial({ color: 0x5b5b5b, roughness: 1.0 }); 
            const matDarkHole = new THREE.MeshBasicMaterial({ color: 0x0a0401 }); 

            // 1. PONDASI & PILAR 
            const umpakBaseGeo = new THREE.BoxGeometry(0.9, 0.4, 0.9);
            const umpakTopGeo = new THREE.CylinderGeometry(0.35, 0.45, 0.6, 4);
            umpakTopGeo.rotateY(Math.PI / 4);

            const pillarGeo = new THREE.BoxGeometry(0.45, 3.8, 0.45);

            const pilarPositions = [
                [-8, -3], [-8, 0], [-8, 3],
                [-4.5, -3], [-4.5, 0], [-4.5, 3],
                [4.5, -3],  [4.5, 0],  [4.5, 3],
                [8, -3],  [8, 0],  [8, 3],
                [-2.5, 6], [2.5, 6] 
            ];

            pilarPositions.forEach(pos => {
                const umpakGroup = new THREE.Group();
                const uBase = new THREE.Mesh(umpakBaseGeo, matStone);
                uBase.position.y = 0.2;
                uBase.castShadow = true; uBase.receiveShadow = true;
                const uTop = new THREE.Mesh(umpakTopGeo, matStone);
                uTop.position.y = 0.7;
                uTop.castShadow = true; uTop.receiveShadow = true;

                umpakGroup.add(uBase); umpakGroup.add(uTop);
                umpakGroup.position.set(pos[0], 0, pos[1]);
                houseGroup.add(umpakGroup);

                const pillar = new THREE.Mesh(pillarGeo, matWoodBody);
                pillar.position.set(pos[0], 2.9, pos[1]); 
                pillar.castShadow = true; pillar.receiveShadow = true;
                houseGroup.add(pillar);

                const sabukGeo = new THREE.BoxGeometry(0.55, 1, 0.55);
                const sabuk = new THREE.Mesh(sabukGeo, matWoodDetail);
                sabuk.position.set(pos[0], 2.5, pos[1]);
                sabuk.castShadow = true;
                houseGroup.add(sabuk);
            });

            // 2. BADAN RUMAH UTAMA & LANTAI
            const floorGeo = new THREE.BoxGeometry(18, 0.6, 8.5);
            const floor = new THREE.Mesh(floorGeo, matWoodFloor);
            floor.position.set(0, 4.8, 0);
            floor.receiveShadow = true; floor.castShadow = true;
            houseGroup.add(floor);

            const bodyGeo = new THREE.BoxGeometry(17, 4.5, 7.5);
            const body = new THREE.Mesh(bodyGeo, matWoodBody);
            body.position.set(0, 7.35, 0);
            body.receiveShadow = true; body.castShadow = true;
            houseGroup.add(body);

            // Jendela
            const windowGroupL = createDetailedWindow(matWoodDetail, matDarkHole);
            windowGroupL.position.set(-5.5, 7.5, 3.76);
            houseGroup.add(windowGroupL);

            const windowGroupR = createDetailedWindow(matWoodDetail, matDarkHole);
            windowGroupR.position.set(5.5, 7.5, 3.76);
            houseGroup.add(windowGroupR);

            // PENAMBAHAN: Motif Panel Ukiran Bunga & Sulur Melengkung pada Dinding Depan
            function createWallCarving(matFrame, matDetail) {
                const group = new THREE.Group();
                
                // Latar belakang panel
                const bg = new THREE.Mesh(new THREE.BoxGeometry(1.2, 3.8, 0.1), matFrame);
                group.add(bg);

                // Bingkai luar panel
                const borderL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 3.8, 0.18), matFrame);
                borderL.position.set(-0.55, 0, 0.05);
                group.add(borderL);
                const borderR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 3.8, 0.18), matFrame);
                borderR.position.set(0.55, 0, 0.05);
                group.add(borderR);
                const borderT = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.1, 0.18), matFrame);
                borderT.position.set(0, 1.85, 0.05);
                group.add(borderT);
                const borderB = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.1, 0.18), matFrame);
                borderB.position.set(0, -1.85, 0.05);
                group.add(borderB);

                // Batang tengah vertikal
                const stem = new THREE.Mesh(new THREE.BoxGeometry(0.08, 3.6, 0.15), matDetail);
                stem.position.z = 0.05;
                group.add(stem);

                // Motif Ukiran Sulur (Batik Daun Melengkung)
                const sulurShape = new THREE.Shape();
                sulurShape.moveTo(0, 0);
                sulurShape.bezierCurveTo(0.4, 0.2, 0.5, 0.5, 0.3, 0.8);
                sulurShape.bezierCurveTo(0.1, 1.0, -0.1, 0.7, 0.1, 0.5);
                sulurShape.bezierCurveTo(0.2, 0.4, 0.3, 0.5, 0.2, 0.6); // Pusaran dalam
                sulurShape.lineTo(0.15, 0.6); 
                sulurShape.bezierCurveTo(0.3, 0.5, 0.2, 0.3, 0, 0.1); 

                const extrudeOpts = { depth: 0.12, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 2 };
                const sulurGeo = new THREE.ExtrudeGeometry(sulurShape, extrudeOpts);

                // Menyusun motif sulur di sepanjang panel
                for(let y = -1.2; y <= 1.2; y += 0.8) {
                    const sr = new THREE.Mesh(sulurGeo, matDetail);
                    sr.position.set(0, y, 0.05);
                    group.add(sr);

                    const sl = new THREE.Mesh(sulurGeo, matDetail);
                    sl.rotation.y = Math.PI; // Cerminkan ke kiri
                    sl.position.set(0, y, 0.05);
                    group.add(sl);

                    // Tambahkan kembang wajik/bunga kecil di antaranya
                    const flower = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.15, 4), matDetail);
                    flower.rotation.x = Math.PI / 2;
                    flower.position.set(0, y + 0.4, 0.05);
                    group.add(flower);
                }

                return group;
            }

            // Menyisipkan panel ukiran ke 4 titik dinding
            const carvingX = [-7.6, -3.4, 3.4, 7.6]; 
            carvingX.forEach(x => {
                const carving = createWallCarving(matWoodBody, matWoodDetail);
                carving.position.set(x, 7.35, 3.78);
                carving.castShadow = true;
                houseGroup.add(carving);
            });

            // PENAMBAHAN: Sabuk Dinding Horizontal (List Kayu Berukir Motif Daun Sulur)
            const friezeGroup = new THREE.Group();
            const friezeBg = new THREE.Mesh(new THREE.BoxGeometry(17.2, 0.5, 0.15), matWoodBody);
            friezeGroup.add(friezeBg);
            
            // Motif berulang pada sabuk dinding
            for(let x = -8.2; x <= 8.2; x += 0.8) {
                // Kembang pusat (Cylinder 8 sisi)
                const fCenter = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.2, 8), matWoodDetail);
                fCenter.rotation.x = Math.PI / 2;
                fCenter.position.set(x, 0, 0.05);
                friezeGroup.add(fCenter);

                // Penghubung Horizontal
                if (x < 8.2) {
                    const link = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.18), matWoodDetail);
                    link.position.set(x + 0.4, 0, 0.05);
                    friezeGroup.add(link);
                    
                    // Titik ukiran kecil di atas & bawah penghubung
                    const dot1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.2), matWoodDetail);
                    dot1.position.set(x + 0.4, 0.15, 0.05);
                    friezeGroup.add(dot1);
                    
                    const dot2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.2), matWoodDetail);
                    dot2.position.set(x + 0.4, -0.15, 0.05);
                    friezeGroup.add(dot2);
                }
            }
            friezeGroup.position.set(0, 9.35, 3.78);
            houseGroup.add(friezeGroup);

            // 3. TERAS DEPAN & GAPURA 
            const porchFloorGeo = new THREE.BoxGeometry(6, 0.6, 4.5);
            const porchFloor = new THREE.Mesh(porchFloorGeo, matWoodFloor);
            porchFloor.position.set(0, 4.8, 4);
            porchFloor.receiveShadow = true; porchFloor.castShadow = true;
            houseGroup.add(porchFloor);

            const doorWallGeo = new THREE.BoxGeometry(5.5, 4.5, 0.2);
            const doorWall = new THREE.Mesh(doorWallGeo, matWoodBody);
            doorWall.position.set(0, 7.35, 3.76);
            houseGroup.add(doorWall);
            
            const doorGeo = new THREE.BoxGeometry(2.2, 3.5, 0.3);
            const door = new THREE.Mesh(doorGeo, matDarkHole);
            door.position.set(0, 6.8, 3.76);
            houseGroup.add(door);

            const archShape = new THREE.Shape();
            archShape.moveTo(-2.7, 0);
            archShape.lineTo(2.7, 0);
            archShape.lineTo(2.7, 2.5);
            archShape.bezierCurveTo(1.8, 2.5, 1.2, 1.5, 0, 1.5);
            archShape.bezierCurveTo(-1.2, 1.5, -1.8, 2.5, -2.7, 2.5);
            archShape.lineTo(-2.7, 0);
            
            const archExtrude = { depth: 0.3, bevelEnabled: false };
            const archGeo = new THREE.ExtrudeGeometry(archShape, archExtrude);
            archGeo.translate(0, 0, -0.15);
            const arch = new THREE.Mesh(archGeo, matWoodDetail);
            arch.position.set(0, 7, 6); 
            arch.castShadow = true;
            houseGroup.add(arch);

            // 4. STRUKTUR ATAP
            const roofGroup = new THREE.Group();

            function createSweptRoofGeometry(baseRadius, topRadius, height, concavity) {
                const points = [];
                for ( let i = 0; i <= 20; i ++ ) {
                    const t = i / 20;
                    const x = Math.pow(1-t, 2)*baseRadius + 2*(1-t)*t*(baseRadius - concavity) + Math.pow(t, 2)*topRadius;
                    const y = Math.pow(1-t, 2)*0 + 2*(1-t)*t*(height * 0.1) + Math.pow(t, 2)*height;
                    points.push(new THREE.Vector2(x, y));
                }
                const geo = new THREE.LatheGeometry(points, 4); 
                geo.rotateY(Math.PI / 4); 
                return geo;
            }

            function addHornsAt(x, y, z, scale) {
                const hornShape = new THREE.Shape();
                hornShape.moveTo(0, 0);
                hornShape.quadraticCurveTo(1.0, -0.2, 1.5, 1.2); 
                hornShape.quadraticCurveTo(0.8, 0.6, -0.2, 0.5);
                hornShape.lineTo(0,0);
                const hornGeo = new THREE.ExtrudeGeometry(hornShape, {depth: 0.2, bevelEnabled: true, bevelSize: 0.05, bevelThickness: 0.05});
                hornGeo.translate(0, 0, -0.1); 

                const horn = new THREE.Mesh(hornGeo, matWoodDetail);
                horn.position.set(x, y, z);
                horn.rotation.y = -Math.atan2(z, x); 
                horn.scale.set(scale, scale, scale);
                roofGroup.add(horn);
            }

            const lowerRoofGeo = createSweptRoofGeometry(14, 6, 5, 4);
            const lowerRoof = new THREE.Mesh(lowerRoofGeo, matRoof);
            lowerRoof.position.set(0, 9.2, 0);
            lowerRoof.scale.set(1.2, 1, 0.8);
            lowerRoof.castShadow = true; lowerRoof.receiveShadow = true;
            roofGroup.add(lowerRoof);
            
            const lrX = 14 * 0.707 * 1.2; 
            const lrZ = 14 * 0.707 * 0.8; 
            addHornsAt(lrX, 9.2, lrZ, 1.0);
            addHornsAt(-lrX, 9.2, lrZ, 1.0);
            addHornsAt(lrX, 9.2, -lrZ, 1.0);
            addHornsAt(-lrX, 9.2, -lrZ, 1.0);

            const upperRoofGeo = createSweptRoofGeometry(7.5, 0.1, 8, 3);
            const upperRoof = new THREE.Mesh(upperRoofGeo, matRoof);
            upperRoof.position.set(0, 12.5, 0);
            upperRoof.scale.set(1.1, 1, 0.8);
            upperRoof.castShadow = true; upperRoof.receiveShadow = true;
            roofGroup.add(upperRoof);
            
            const urX = 7.5 * 0.707 * 1.1; 
            const urZ = 7.5 * 0.707 * 0.8; 
            addHornsAt(urX, 12.5, urZ, 0.8);
            addHornsAt(-urX, 12.5, urZ, 0.8);
            addHornsAt(urX, 12.5, -urZ, 0.8);
            addHornsAt(-urX, 12.5, -urZ, 0.8);

            const gableShape = new THREE.Shape();
            gableShape.moveTo(0, 3.5); 
            gableShape.quadraticCurveTo(2, 1.5, 4.5, 0); 
            gableShape.lineTo(0, 0); 
            gableShape.lineTo(-4.5, 0); 
            gableShape.quadraticCurveTo(-2, 1.5, 0, 3.5); 
            
            const porchRoofGeo = new THREE.ExtrudeGeometry(gableShape, { depth: 4.6, bevelEnabled: false });
            const porchRoof = new THREE.Mesh(porchRoofGeo, matRoof);
            porchRoof.position.set(0, 9.2, 2.0); 
            porchRoof.castShadow = true; porchRoof.receiveShadow = true;
            roofGroup.add(porchRoof);

            const lisplangShape = new THREE.Shape();
            lisplangShape.moveTo(-5.5, 0.5); 
            lisplangShape.quadraticCurveTo(-4.8, 0.2, -4.5, 0.5); 
            lisplangShape.quadraticCurveTo(-2.2, 2.0, 0, 4.0); 
            lisplangShape.quadraticCurveTo(2.2, 2.0, 4.5, 0.5); 
            lisplangShape.quadraticCurveTo(4.8, 0.2, 5.5, 0.5); 
            lisplangShape.lineTo(4.8, 1.2); 
            lisplangShape.quadraticCurveTo(2.5, 2.8, 0, 4.8); 
            lisplangShape.quadraticCurveTo(-2.5, 2.8, -4.8, 1.2);
            lisplangShape.lineTo(-5.5, 0.5);

            const lisplangGeo = new THREE.ExtrudeGeometry(lisplangShape, { depth: 0.2, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05 });
            const lisplang = new THREE.Mesh(lisplangGeo, matWoodDetail);
            lisplang.position.set(0, 9.0, 6.6); 
            lisplang.castShadow = true;
            houseGroup.add(lisplang);

            houseGroup.add(roofGroup);

            // 5. TANGGA MASUK MEGAH
            const stairGroup = new THREE.Group();
            const stepWidth = 3.6;
            
            for(let i=0; i<12; i++) {
                const stepGeo = new THREE.BoxGeometry(stepWidth, 0.3, 0.8);
                const step = new THREE.Mesh(stepGeo, matWoodFloor);
                step.position.set(0, 0.5 + (i*0.38), 10.5 - (i*0.45));
                step.castShadow = true; step.receiveShadow = true;
                stairGroup.add(step);
            }
            
            const railGeo = new THREE.BoxGeometry(0.3, 6.5, 0.4);
            const railL = new THREE.Mesh(railGeo, matWoodDetail);
            railL.position.set(-1.9, 3, 8.2);
            railL.rotation.x = -Math.PI / 4.5;
            stairGroup.add(railL);
            
            const railR = new THREE.Mesh(railGeo, matWoodDetail);
            railR.position.set(1.9, 3, 8.2);
            railR.rotation.x = -Math.PI / 4.5;
            stairGroup.add(railR);

            const stairPillarGeo = new THREE.BoxGeometry(0.7, 1.8, 0.7);
            const stairPillarL = new THREE.Mesh(stairPillarGeo, matStone);
            stairPillarL.position.set(-1.9, 0.9, 10.5);
            stairGroup.add(stairPillarL);
            
            const stairPillarR = new THREE.Mesh(stairPillarGeo, matStone);
            stairPillarR.position.set(1.9, 0.9, 10.5);
            stairGroup.add(stairPillarR);

            houseGroup.add(stairGroup);

            // 6. MAHKOTA SIGER
            const s = new THREE.Shape();
            s.moveTo(-3.8, 0.5);
            s.quadraticCurveTo(0, 1.5, 3.8, 0.5); 
            s.quadraticCurveTo(4.2, 0.8, 3.8, 2.2); 
            s.quadraticCurveTo(3.2, 1.5, 2.8, 1.8); 
            s.quadraticCurveTo(3.0, 2.6, 2.3, 2.8); 
            s.quadraticCurveTo(1.8, 2.2, 1.5, 2.5); 
            s.quadraticCurveTo(1.6, 3.4, 0.8, 3.5); 
            s.quadraticCurveTo(0.5, 3.0, 0.3, 3.3); 
            s.lineTo(0.2, 4.3); 
            s.lineTo(0, 4.8);   

            s.lineTo(-0.2, 4.3);
            s.quadraticCurveTo(-0.5, 3.0, -0.8, 3.5); 
            s.quadraticCurveTo(-1.6, 3.4, -1.5, 2.5); 
            s.quadraticCurveTo(-1.8, 2.2, -2.3, 2.8); 
            s.quadraticCurveTo(-3.0, 2.6, -2.8, 1.8); 
            s.quadraticCurveTo(-3.2, 1.5, -3.8, 2.2); 
            s.quadraticCurveTo(-4.2, 0.8, -3.8, 0.5); 

            const hole = new THREE.Path();
            hole.moveTo(0, 3.2);
            hole.lineTo(0.2, 3.5);
            hole.lineTo(0, 3.8);
            hole.lineTo(-0.2, 3.5);
            hole.lineTo(0, 3.2);
            s.holes.push(hole);

            const extrudeSettings = { depth: 0.2, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05, bevelSegments: 3 };
            const sigerGeo = new THREE.ExtrudeGeometry(s, extrudeSettings);
            sigerGeo.translate(0, 0, -0.1); 

            const sigerMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.7, roughness: 0.2 });

            textureLoader.load('A.png', 
                function(texture) {
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.RepeatWrapping;
                    texture.repeat.set(1/8.4, 1/4.8); 
                    texture.offset.set(0.5, -0.5/4.8);
                    sigerMat.map = texture;
                    sigerMat.color.setHex(0xffffff); 
                    sigerMat.needsUpdate = true;
                }
            );

            const sigerMesh = new THREE.Mesh(sigerGeo, sigerMat);
            sigerMesh.castShadow = true;
            sigerMesh.receiveShadow = true;
            
            sigerMesh.position.set(0, 18.6, 2.0); 
            sigerMesh.rotation.x = -0.15; 
            sigerMesh.scale.set(0.9, 0.9, 0.9);
            houseGroup.add(sigerMesh);

            scene.add(houseGroup);
        }

        function createDetailedWindow(matWood, matDark) {
            const group = new THREE.Group();
            const panel = new THREE.Mesh(new THREE.BoxGeometry(3.5, 3.2, 0.2), matWood);
            const darkHole = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.2, 0.3), matDark);
            const bar1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.2, 0.4), matWood);
            const bar2 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, 0.4), matWood);
            group.add(panel);
            group.add(darkHole);
            group.add(bar1);
            group.add(bar2);
            return group;
        }

        function createNumberSprite(numberStr) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 4;

            ctx.beginPath();
            ctx.arc(64, 64, 50, 0, Math.PI * 2);
            ctx.fillStyle = '#dc2626'; 
            ctx.fill();

            ctx.lineWidth = 6;
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();

            ctx.shadowBlur = 0; 
            ctx.font = 'bold 55px "Segoe UI", Arial, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(numberStr, 64, 68); 

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            
            const sprite = new THREE.Sprite(material);
            return sprite;
        }

        function createHotspots() {
            const points = [
                { id: 'siger', num: "1", pos: [3.8, 20.3, 2.0] },     
                { id: 'atap', num: "2", pos: [7, 14, 2] },      
                { id: 'panggung', num: "3", pos: [-6, 2, 5] },    
                { id: 'lantai', num: "4", pos: [2, 5.5, 4.5] },         
                { id: 'tangga', num: "5", pos: [0, 3, 9] },     
                { id: 'ukiran', num: "6", pos: [-3, 8.5, 6.5] }     
            ];

            points.forEach(p => {
                const marker = createNumberSprite(p.num);
                marker.position.set(p.pos[0], p.pos[1], p.pos[2]);
                marker.userData = { isHotspot: true, id: p.id, baseScale: 2.2 };
                
                scene.add(marker);
                hotspots.push(marker); 
            });
        }

        function onPointerDown(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(hotspots);

            if (intersects.length > 0) {
                controls.saveState();
                const hotspotId = intersects[0].object.userData.id;
                openModal(hotspotId);
            }
        }

        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const time = clock.getElapsedTime();
            hotspots.forEach((marker, index) => {
                marker.position.y += Math.sin(time * 3 + index) * 0.008;
                const scale = marker.userData.baseScale + Math.sin(time * 5) * 0.15;
                marker.scale.set(scale, scale, 1);
            });

            renderer.render(scene, camera);
        }

        const modal = document.getElementById('infoModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const modalIcon = document.getElementById('modalIcon');

        function openModal(bagian) {
            const data = dataFilosofi[bagian];
            if (data) {
                modalTitle.innerText = data.title;
                modalDesc.innerText = data.desc;
                modalIcon.innerText = data.icon;
                modal.classList.add('show');
            }
        }

        function closeModal() {
            modal.classList.remove('show');
        }

        window.onclick = function(event) {
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
